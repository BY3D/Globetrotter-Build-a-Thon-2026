<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- MapLibre -->
    <script src='https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css' rel='stylesheet' />
    <!-- MapTiler -->
    <script src="https://cdn.maptiler.com/maptiler-sdk-js/v3.10.2/maptiler-sdk.umd.min.js"></script>
    <link href="https://cdn.maptiler.com/maptiler-sdk-js/v3.10.2/maptiler-sdk.css" rel="stylesheet" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=Raleway:ital@0;1&display=swap"
        rel="stylesheet">
    <!-- Local Script and CSS Stylesheet -->
    <script src="client.js"></script>
    <link href="style.css" rel="stylesheet">
    <title>Globetrotter</title>
</head>

<body>
    <div id="WelcomeUser">
        <h1>Welcome to<br><strong>GlobeTrotter</strong></h1>
        <h2><em>Explore the Globe</em></h2>
    </div>

    <div id="MapTiler"></div>
    <script>
        // import { MAPTILER_KEY } from "../javascript/keys.js";
        maptilersdk.config.apiKey = "a0oUV9hNkxpUYzHNAQJo";
        const detailedMap = new maptilersdk.Map({
            container: 'MapTiler', // container's id or the HTML element to render the map
            style: "streets-v4",
            center: [31.1308, 29.9758], // starting position [lng, lat]
            zoom: 15, // starting zoom
        });
        // Make MapTiler instance available to client.js
        window.detailedMap = detailedMap;
    </script>

    <div id="Wikipedia-Image"></div>

    <!-- User Input and LLM Output -->
    <form id="chatbox">
        <textarea id="user-input"
            placeholder='Ask questions about landmarks around the world, like "Are there pyramids in Mexico?" or "Where is the Taj Mahal?"'
            required></textarea>
        <button id="clear-chat" class="input-button" type="button">Clear Chat</button>
        <button id="generate-response" class="input-button" type="submit">←</button>
    </form>

    <section id="LLMbox"></section>

    <!-- MapLibre-GL Globe -->
    <div id='MapLibre-Space'></div>
    <div id='MapLibre'></div>
    <script>
        const mapInstance = new maplibregl.Map({
            container: 'MapLibre', // Render map in HTML element with ID MapLibre
            style: 'https://demotiles.maplibre.org/style.json', // stylesheet location
            center: [31.1308, 29.9758], // starting position [longitude, latitude]
            zoom: 3 // starting zoom
        });

        mapInstance.on('style.load', () => {
            mapInstance.setProjection({
                type: 'globe', // Set projection to globe
            });
        });

        const markerInstance = new maplibregl.Marker();

        // Make map instance available to client.js
        window.mapInstance = mapInstance;
        window.markerInstance = markerInstance;
    </script>

    <!-- Star Background -->
    <div id="star-background">
        <div class="star" style="left: 2%; top: 7%;"></div>
        <div class="star" style="left: 5%; top: 90%;"></div>
        <div class="star" style="left: 45%; top: 20%;"></div>
        <div class="star" style="left: 50%; top: 65%;"></div>
        <div class="star" style="left: 97%; top: 5%;"></div>
        <div class="star" style="left: 92%; top: 95%;"></div>
    </div>
</body>
