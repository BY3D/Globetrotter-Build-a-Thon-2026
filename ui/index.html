<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src='https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css' rel='stylesheet' />
    <script src="https://cdn.maptiler.com/maptiler-sdk-js/v3.10.2/maptiler-sdk.umd.min.js"></script>
    <link href="https://cdn.maptiler.com/maptiler-sdk-js/v3.10.2/maptiler-sdk.css" rel="stylesheet" />

    <script src="client.js"></script>
    <link href="style.css" rel="stylesheet">
    <title>Globetrotter</title>
</head>

<body>
    <div id="WelcomeUser">
        <h2>Welcome to</h2>
        <h1><strong>GlobeTrotter</strong></h1>
    </div>
    <div id="MapTiler"></div>
    <script>
        // import { MAPTILER_KEY } from "../javascript/keys.js";
        maptilersdk.config.apiKey = "a0oUV9hNkxpUYzHNAQJo";
        const detailedMap = new maptilersdk.Map({
            container: 'MapTiler', // container's id or the HTML element to render the map
            style: "streets-v4",
            center: [31.1308, 29.9758], // starting position [lng, lat]
            zoom: 15, // starting zoom
        });
        // Make MapTiler instance available to client.js
        window.detailedMap = detailedMap;
    </script>
    <!-- User Input and LLM Output -->
    <form id="chatbox">
        <textarea id="user-input" placeholder="Write your inquiry here" required></textarea>
        <button id="generate-response" type="submit">←</button>
    </form>
    <section id="LLMbox"></section>
    <!-- MapLibre-GL Globe -->
     <div id='MapLibre-Space'></div>
    <div id='MapLibre'></div>
    <script>
        const mapInstance = new maplibregl.Map({
            container: 'MapLibre', // Render map in HTML element with ID MapLibre
            style: 'https://demotiles.maplibre.org/style.json', // stylesheet location
            center: [31.1308, 29.9758], // starting position [longitude, latitude]
            zoom: 3 // starting zoom
        });

        mapInstance.on('style.load', () => {
            mapInstance.setProjection({
                type: 'globe', // Set projection to globe
            });
        });

        const markerInstance = new maplibregl.Marker();

        // Make map instance available to client.js
        window.mapInstance = mapInstance;
        window.markerInstance = markerInstance;
    </script>
    <script>
        var url = "https://en.wikipedia.org/w/api.php";

        var params = {
            action: "query",
            list: "geosearch",
            gscoord: "29.9771933 | 31.1320398",
            gsradius: "10000",
            gslimit: "10",
            format: "json"
        };

        url = url + "?origin=*";
        Object.keys(params).forEach(function (key) { url += "&" + key + "=" + params[key]; });

        fetch(url)
            .then(function (response) { return response.json(); })
            .then(function (response) {
                var pages = response.query.geosearch;
                for (var place in pages) {
                    console.log(pages[place].title);
                }
            })
            .catch(function (error) { console.log(error); });
    </script>
</body>
